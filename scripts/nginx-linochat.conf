# Nginx config for linochat.com (frontend + API on same domain)
# Place in /etc/nginx/sites-available/ or your hosting panel
# Adjust paths and php-fpm socket for your server

server {
    listen 80;
    listen [::]:80;
    server_name linochat.com www.linochat.com;

    # Frontend SPA
    root /home/admin2/web/linochat.com/public_html/frontend/dist;
    index index.html;

    # API routes → Laravel backend (REQUIRED for chat widget & AI)
    location /api {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /home/admin2/web/linochat.com/public_html/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # Frontend SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
