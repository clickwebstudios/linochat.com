# Nginx config for linochat.com (frontend + API on same domain)
# Place in /etc/nginx/sites-available/ or your hosting panel
# Adjust paths and php-fpm socket for your server

server {
    listen 80;
    listen [::]:80;
    server_name linochat.com www.linochat.com;

    # Frontend SPA
    root /home/admin2/web/linochat.com/public_html/frontend/dist;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.pusher.com https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://*.pusher.com https://*.pusher.com https://accounts.google.com; img-src 'self' data: https:; frame-src https://accounts.google.com; frame-ancestors 'none';" always;

    # ── API routes → Laravel backend ────────────────────────────────────
    location /api {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /home/admin2/web/linochat.com/public_html/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 30;
        include fastcgi_params;
    }

    # Laravel broadcasting auth (REQUIRED for private WebSocket channels)
    location /broadcasting {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /home/admin2/web/linochat.com/public_html/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # Widget script — no CSP frame-ancestors restriction (embedded on customer sites)
    location /widget {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /home/admin2/web/linochat.com/public_html/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Frontend SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
