name: Claude Auto Bug Scanner

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Scope to scan (backend, frontend, or all)'
        required: false
        default: 'all'

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile 2>/dev/null || pnpm install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Determine scope
        run: |
          SCOPE="${{ github.event.inputs.scope || 'all' }}"
          echo "SCAN_SCOPE=$SCOPE" >> $GITHUB_ENV

      - name: Run Claude Bug Scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SCOPE="${{ env.SCAN_SCOPE }}"

          if [ "$SCOPE" = "backend" ]; then
            SCAN_DIRS="backend/app/ backend/routes/"
          elif [ "$SCOPE" = "frontend" ]; then
            SCAN_DIRS="frontend/src/"
          else
            SCAN_DIRS="backend/app/ backend/routes/ frontend/src/"
          fi

          claude -p "You are a senior developer performing a bug scan on LinoChat.

          Scan scope: $SCAN_DIRS

          Your task:
          1. Read through the key files in the scan scope looking for bugs
          2. Focus on: null reference errors, unhandled exceptions, logic errors, security vulnerabilities (SQL injection, XSS, CSRF), type mismatches, broken API contracts, race conditions
          3. For the backend, check: controller validation, service error handling, route definitions, middleware
          4. For the frontend, check: component state bugs, missing error boundaries, API call error handling, type safety
          5. Fix every real bug you find by editing the file directly
          6. Run 'php -l <file>' on every PHP file you change
          7. Run 'cd frontend && npx tsc --noEmit 2>&1 | head -50' after frontend changes to check types
          8. Do NOT refactor, restyle, or 'improve' working code
          9. Do NOT add comments, docstrings, or tests unless fixing an actual bug
          10. Keep a running list of every bug you fix with file path and description

          Start by reading CLAUDE.md for project context, then scan systematically." \
          --allowedTools "Read,Write,Edit,Bash(php -l *),Bash(cd frontend && npx tsc*),Bash(git diff *),Bash(git status),Glob,Grep" \
          --max-turns 40 \
          --output-format text > /tmp/claude_scan.txt 2>&1 || true

          cat /tmp/claude_scan.txt

      - name: Check for changes and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude-bot@linochat.com"

          if git diff --quiet && git diff --staged --quiet; then
            echo "No bugs found — codebase is clean!"
            exit 0
          fi

          # Create a branch for the fixes
          BRANCH="claude/auto-bugfix-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix: automated bug fixes by Claude Code scanner

          Co-Authored-By: Claude Code Bot <claude-bot@linochat.com>"
          git push -u origin "$BRANCH"

          # Build PR body from scan results
          SCAN_RESULTS=$(cat /tmp/claude_scan.txt | head -200)

          gh pr create \
            --title "fix: automated bug fixes ($(date +%Y-%m-%d))" \
            --body "$(cat <<EOF
          ## Automated Bug Scan Results

          Claude Code scanned the codebase and found issues that were automatically fixed.

          <details><summary>Scan Details</summary>

          \`\`\`
          $SCAN_RESULTS
          \`\`\`

          </details>

          > Review these changes before merging. Auto-generated by Claude Code Bug Scanner.

          🤖 Generated with [Claude Code](https://claude.com/claude-code)
          EOF
          )" \
            --base master \
            --head "$BRANCH"
