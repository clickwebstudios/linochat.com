name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo ">>> Pulling latest code..."
            git pull origin master
            echo ">>> Backend: Installing dependencies..."
            cd backend && composer install --no-dev --optimize-autoloader --no-interaction
            echo ">>> Backend: Running migrations..."
            php artisan migrate --force
            echo ">>> Backend: Caching config..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo ">>> Frontend: Installing dependencies..."
            cd ../frontend && pnpm install --frozen-lockfile
            echo ">>> Frontend: Building..."
            pnpm run build
            echo ">>> Restarting services..."
            cd ..
            # Restart PHP-FPM (adjust for your setup: php8.2-fpm, php-fpm, etc.)
            sudo systemctl reload php8.2-fpm 2>/dev/null || sudo systemctl reload php-fpm 2>/dev/null || true
            # Restart queue workers if using Supervisor
            sudo supervisorctl restart linochat-worker 2>/dev/null || true
            # Restart Reverb if running as service
            sudo supervisorctl restart linochat-reverb 2>/dev/null || true
            echo ">>> Deploy complete!"
