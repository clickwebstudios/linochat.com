name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.78.92.126
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH"
            DEPLOY_PATH="/home/admin/web/linochat.com/public_html"

            echo ">>> [1/6] Pulling latest code..."
            cd $DEPLOY_PATH
            git fetch origin master
            git reset --hard origin/master

            echo ">>> [2/6] Backend: Installing PHP dependencies..."
            cd $DEPLOY_PATH/backend
            composer install --no-dev --optimize-autoloader --no-interaction

            echo ">>> [3/6] Backend: Running migrations & clearing cache..."
            php artisan migrate --force || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache

            echo ">>> [4/6] Frontend: Installing JS dependencies..."
            cd $DEPLOY_PATH/frontend
            pnpm install --frozen-lockfile 2>/dev/null || pnpm install

            echo ">>> [5/6] Frontend: Building..."
            pnpm run build

            echo ">>> [6/6] Fixing permissions & restarting workers..."
            chown -R www-data:www-data $DEPLOY_PATH/backend/storage $DEPLOY_PATH/backend/bootstrap/cache
            supervisorctl restart linochat-worker:* linochat-reverb

            echo ">>> Deploy complete!"

      - name: Notify Slack - Deploy Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "#2eb886",
                "text": ":white_check_mark: <https://linochat.com|linochat.com> deployment success\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`\nMessage: `${{ github.event.head_commit.message || 'Manual deploy' }}`\nBy: ${{ github.actor }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Show more>"
              }]
            }

      - name: Notify Slack - Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "#dc3545",
                "text": ":x: <https://linochat.com|linochat.com> deployment failed\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`\nMessage: `${{ github.event.head_commit.message || 'Manual deploy' }}`\nBy: ${{ github.actor }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Show more>"
              }]
            }
