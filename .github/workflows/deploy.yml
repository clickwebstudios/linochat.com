name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 63.250.42.183
          username: admin2
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH"
            DEPLOY_PATH="/home/admin2/web/linochat.com/public_html"

            echo ">>> [1/5] Pulling latest code..."
            cd $DEPLOY_PATH
            git fetch origin master
            git reset --hard origin/master

            echo ">>> [2/5] Backend: Installing PHP dependencies..."
            cd $DEPLOY_PATH/backend
            composer install --no-dev --optimize-autoloader --no-interaction

            echo ">>> [3/5] Backend: Running migrations & clearing cache..."
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache

            echo ">>> [4/5] Frontend: Installing JS dependencies..."
            cd $DEPLOY_PATH/frontend
            npm ci

            echo ">>> [5/5] Frontend: Building..."
            npm run build

            echo ">>> Deploy complete!"

      - name: Notify Slack - Deploy Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: *Deploy successful* for `linochat.com`\nCommit: `${{ github.sha }}` by *${{ github.actor }}*"
            }

      - name: Notify Slack - Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *Deploy FAILED* for `linochat.com`\nCommit: `${{ github.sha }}` by *${{ github.actor }}*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
