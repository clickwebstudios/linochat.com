name: Claude Code Review & Auto-Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Custom prompt for Claude'
        required: false
        default: 'Review the codebase for bugs and fix them'

jobs:
  claude-review:
    # Run on PR events, or on issue comments that mention @claude
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Review on PR
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Get the diff for this PR
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > /tmp/pr_diff.txt
          DIFF_SIZE=$(wc -c < /tmp/pr_diff.txt)

          echo "PR diff size: $DIFF_SIZE bytes"

          claude -p "You are reviewing a pull request for LinoChat.

          Here is the diff:
          $(cat /tmp/pr_diff.txt)

          Instructions:
          1. Review ALL changed files for bugs, security issues, logic errors, and typos
          2. Check for: null pointer errors, missing error handling, SQL injection, XSS, type mismatches, off-by-one errors, race conditions
          3. For each bug found, fix it directly by editing the file
          4. After fixing, run 'php -l' on any changed PHP files to verify syntax
          5. Do NOT refactor working code or add unnecessary changes
          6. Do NOT add comments, docstrings, or type annotations to unchanged code
          7. Only fix actual bugs — do not change style or formatting

          If you find bugs and fix them, create a summary of what you fixed.
          If no bugs are found, say 'No bugs found — code looks good.'" \
          --allowedTools "Read,Write,Edit,Bash(php -l *),Bash(git diff *),Bash(git status),Glob,Grep" \
          --max-turns 20 \
          --output-format text > /tmp/claude_review.txt 2>&1 || true

          cat /tmp/claude_review.txt

      - name: Run Claude on Comment
        if: github.event_name == 'issue_comment'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          # Strip @claude prefix
          PROMPT=$(echo "$COMMENT_BODY" | sed 's/@claude\s*//')

          claude -p "$PROMPT

          Instructions:
          - Fix the issue described above
          - Edit files directly
          - Run 'php -l' on changed PHP files to verify syntax
          - Keep changes minimal" \
          --allowedTools "Read,Write,Edit,Bash(php -l *),Bash(git diff *),Bash(git status),Glob,Grep" \
          --max-turns 20 \
          --output-format text > /tmp/claude_review.txt 2>&1 || true

          cat /tmp/claude_review.txt

      - name: Run Claude Custom Prompt
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "${{ github.event.inputs.prompt }}

          Instructions:
          - Fix any bugs or issues you find
          - Edit files directly
          - Run 'php -l' on changed PHP files to verify syntax
          - Keep changes minimal — only fix actual problems" \
          --allowedTools "Read,Write,Edit,Bash(php -l *),Bash(git diff *),Bash(git status),Glob,Grep" \
          --max-turns 30 \
          --output-format text > /tmp/claude_review.txt 2>&1 || true

          cat /tmp/claude_review.txt

      - name: Auto-commit fixes
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude-bot@linochat.com"

          # Check if there are any changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git add -A
            git commit -m "fix: auto-fix bugs found by Claude Code review

          Co-Authored-By: Claude Code Bot <claude-bot@linochat.com>"
            git push
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = '';
            try {
              review = fs.readFileSync('/tmp/claude_review.txt', 'utf8');
            } catch (e) {
              review = 'Claude review completed but no output was captured.';
            }

            const hasChanges = process.env.HAS_CHANGES === 'true';
            const header = hasChanges
              ? '## 🔧 Claude Code Review — Bugs Fixed'
              : '## ✅ Claude Code Review — No Issues Found';

            // Truncate if too long for GitHub comment
            if (review.length > 60000) {
              review = review.substring(0, 60000) + '\n\n... (truncated)';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${header}\n\n<details><summary>Review Details</summary>\n\n\`\`\`\n${review}\n\`\`\`\n\n</details>\n\n${hasChanges ? '> ⚠️ Auto-fix commit pushed. Please review the changes.' : ''}`
            });

      - name: Comment on Issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = '';
            try {
              review = fs.readFileSync('/tmp/claude_review.txt', 'utf8');
            } catch (e) {
              review = 'Claude completed but no output was captured.';
            }

            const hasChanges = process.env.HAS_CHANGES === 'true';

            if (review.length > 60000) {
              review = review.substring(0, 60000) + '\n\n... (truncated)';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Claude Response\n\n\`\`\`\n${review}\n\`\`\`\n\n${hasChanges ? '> ✅ Changes committed and pushed.' : '> No changes needed.'}`
            });
